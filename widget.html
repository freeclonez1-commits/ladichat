<!-- Nike Chat Widget → Firebase (Two-Way) | LadiPage Safe -->
<style>
  #nk-chat-wrap { font-family: 'Helvetica Neue', Arial, sans-serif; box-sizing: border-box; }
  #nk-chat-wrap * { box-sizing: border-box; font-family: inherit; }

  #nk-toggle-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 60px; height: 60px; border-radius: 50%;
    background: #111; border: none; cursor: pointer; margin: 0; padding: 0;
    z-index: 99999; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .3s;
  }
  #nk-toggle-btn:hover { transform: scale(1.1); box-shadow: 0 10px 28px rgba(0,0,0,0.35); }
  #nk-toggle-btn img { width: 28px; filter: invert(1); transition: transform .4s cubic-bezier(0.4, 0, 0.2, 1); display: block; }
  #nk-toggle-btn.open img { transform: rotate(90deg) scale(0); opacity: 0; }
  #nk-toggle-btn::after {
    content: '✕'; position: absolute; color: #fff; font-size: 20px; font-weight: 400; line-height: 1;
    opacity: 0; transform: rotate(-90deg) scale(0); transition: all .4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #nk-toggle-btn.open::after { opacity: 1; transform: rotate(0) scale(1); }

  #nk-pulse {
    position: fixed; bottom: 28px; right: 28px;
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(0,0,0,0.12); z-index: 99998;
    animation: nkpulse 2.5s infinite; pointer-events: none;
  }
  @keyframes nkpulse { 0%{transform:scale(1);opacity:0.7} 100%{transform:scale(2.2);opacity:0} }

  #nk-greeting {
    position: fixed; bottom: 100px; right: 28px;
    background: #111; color: #fff;
    padding: 10px 18px; border-radius: 22px;
    font-size: 13px; font-weight: 500; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.2);
    z-index: 99996; pointer-events: none; line-height: 1.4;
    opacity: 0; transform: translateY(10px) scale(0.94);
    transition: opacity .3s ease, transform .3s ease;
  }
  #nk-greeting.show { opacity: 1; transform: translateY(0) scale(1); }
  #nk-greeting::after {
    content: ''; position: absolute; bottom: -7px; right: 22px;
    border: 7px solid transparent; border-top-color: #111; border-bottom: 0;
  }

  #nk-unread-badge {
    position: absolute; top: -3px; right: -3px;
    background: #e00; color: #fff; font-size: 10px; font-weight: 800;
    width: 20px; height: 20px; border-radius: 50%; padding: 0; margin: 0;
    display: none; align-items: center; justify-content: center; line-height: 1;
    border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  #nk-chat-box {
    position: fixed; bottom: 105px; right: 28px;
    width: 370px; height: 580px; max-height: calc(100vh - 140px);
    background: #fff; border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.16);
    z-index: 99997; display: flex; flex-direction: column; overflow: hidden;
    transform: scale(0.92) translateY(24px); transform-origin: bottom right;
    opacity: 0; pointer-events: none;
    transition: all .38s cubic-bezier(0.23, 1, 0.32, 1);
  }
  #nk-chat-box.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
  @media (max-width: 480px) {
    #nk-chat-box { right: 8px; bottom: 90px; width: calc(100vw - 16px); height: calc(100vh - 106px); max-height: none; border-radius: 18px; }
    #nk-greeting { right: 8px; }
    #nk-toggle-btn, #nk-pulse { right: 18px; bottom: 18px; }
  }

  #nk-header {
    background: #111; color: #fff; padding: 18px 20px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  #nk-header img { width: 38px; filter: invert(1); display: block; }
  #nk-header-info { flex: 1; min-width: 0; }
  #nk-header-info h3 { margin: 0; padding: 0; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.1px; line-height: 1.2; }
  #nk-header-info p { margin: 3px 0 0; padding: 0; font-size: 11.5px; color: rgba(255,255,255,0.65); font-weight: 400; line-height: 1; }
  #nk-dot { width: 9px; height: 9px; border-radius: 50%; background: #3ecf3e; flex-shrink: 0; box-shadow: 0 0 8px rgba(62,207,62,0.6); }

  #nk-onboard {
    padding: 28px 22px 24px; flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    background: #fff; overflow-y: auto;
  }
  #nk-onboard h4 { margin: 0 0 8px 0; padding: 0; font-size: 21px; font-weight: 800; color: #111; letter-spacing: -0.4px; line-height: 1.2; }
  #nk-onboard > p { margin: 0 0 24px 0; padding: 0; font-size: 13.5px; color: #777; line-height: 1.6; }
  .nk-input-group { margin: 0 0 16px 0; padding: 0; }
  .nk-input-group label { display: block; margin: 0 0 6px 2px; padding: 0; font-size: 11px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.8px; line-height: 1; }
  .nk-input-group input {
    display: block; width: 100%; border: 1.5px solid #e8e8e8; border-radius: 12px;
    padding: 13px 15px; margin: 0; font-size: 14px; color: #111; outline: none;
    transition: border-color .2s, box-shadow .2s; background: #fafafa; line-height: 1.4;
  }
  .nk-input-group input:focus { border-color: #111; background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.07); }
  .nk-input-group input::placeholder { color: #bbb; }
  #nk-start-btn {
    display: block; width: 100%; margin: 8px 0 0; padding: 14px 0;
    background: #111; color: #fff; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background .2s, transform .2s; line-height: 1;
  }
  #nk-start-btn:hover { background: #333; transform: translateY(-1px); }
  #nk-start-btn:active { transform: translateY(0); }

  #nk-chat-interface { display: none; flex-direction: column; flex: 1; overflow: hidden; background: #f6f6f6; min-height: 0; }
  #nk-messages { flex: 1; overflow-y: auto; padding: 18px 14px 8px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }

  .nk-msg-row { display: flex; width: 100%; margin: 0; padding: 0; }
  .nk-msg-row.admin { justify-content: flex-start; }
  .nk-msg-row.customer { justify-content: flex-end; }
  .nk-msg-row > div { max-width: 82%; display: flex; flex-direction: column; }
  .nk-msg-row.admin > div { align-items: flex-start; }
  .nk-msg-row.customer > div { align-items: flex-end; }

  .nk-msg-bubble {
    margin: 0; padding: 10px 15px; border-radius: 18px;
    font-size: 14px; line-height: 1.55; word-wrap: break-word; word-break: break-word;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07); width: fit-content; max-width: 100%;
  }
  .nk-msg-row.admin .nk-msg-bubble { background: #fff; color: #111; border-bottom-left-radius: 5px; border: 1px solid #ebebeb; }
  .nk-msg-row.customer .nk-msg-bubble { background: #111; color: #fff; border-bottom-right-radius: 5px; }
  .nk-msg-time { margin: 4px 2px 0; padding: 0; font-size: 10px; color: #bbb; font-weight: 500; display: block; line-height: 1; }

  #nk-quick-replies { padding: 8px 12px 4px; margin: 0; display: flex; gap: 7px; flex-wrap: wrap; background: #f6f6f6; flex-shrink: 0; }
  .nk-qr-btn {
    background: #fff; color: #333; border: 1.5px solid #e0e0e0; border-radius: 20px;
    padding: 6px 13px; margin: 0; font-size: 12px; font-weight: 500; cursor: pointer; line-height: 1.3;
    transition: all .18s; white-space: nowrap;
  }
  .nk-qr-btn:hover { background: #111; color: #fff; border-color: #111; }

  #nk-seen-status { margin: 0; padding: 3px 16px 6px; text-align: right; font-size: 11px; color: #bbb; display: none; flex-shrink: 0; line-height: 1; }

  #nk-input-area {
    padding: 10px 12px; margin: 0; background: #fff; border-top: 1px solid #efefef;
    display: flex; gap: 9px; align-items: flex-end; flex-shrink: 0;
  }
  #nk-input-msg {
    flex: 1; border: 1.5px solid #e8e8e8; border-radius: 22px;
    padding: 10px 16px; margin: 0; font-size: 14px; resize: none; outline: none; display: block;
    max-height: 110px; min-height: 40px; line-height: 1.5;
    transition: border-color .2s, box-shadow .2s; background: #f8f8f8; color: #111;
  }
  #nk-input-msg:focus { border-color: #111; background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
  #nk-input-msg::placeholder { color: #bbb; }
  #nk-send-msg-btn {
    width: 40px; height: 40px; background: #111; color: #fff; border: none; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .2s, transform .2s; padding: 0; margin: 0;
  }
  #nk-send-msg-btn:hover { background: #333; transform: scale(1.08); }
  #nk-send-msg-btn svg { width: 16px; height: 16px; fill: currentColor; display: block; }

  #nk-chat-box ::-webkit-scrollbar { width: 3px; }
  #nk-chat-box ::-webkit-scrollbar-track { background: transparent; }
  #nk-chat-box ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
</style>

<!-- HTML WIDGET -->
<div id="nk-chat-wrap">
  <div id="nk-pulse"></div>
  <div id="nk-greeting">Trò chuyện cùng Support Nike 👋</div>

  <button id="nk-toggle-btn" onclick="nkToggle()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike">
    <div id="nk-unread-badge">0</div>
  </button>

  <div id="nk-chat-box">
    <div id="nk-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike">
      <div id="nk-header-info">
        <h3>Support Nike</h3>
        <p>Thường trả lời trong vài phút</p>
      </div>
      <div id="nk-dot"></div>
    </div>

    <div id="nk-onboard">
      <h4>Chat với Nike</h4>
      <p>Xin chào! Để chúng tôi hỗ trợ bạn tốt nhất, vui lòng cho biết một vài thông tin nhé.</p>
      <div class="nk-input-group">
        <label>Tên của bạn</label>
        <input type="text" id="nk-name" placeholder="Ví dụ: Nguyễn Văn A">
      </div>
      <div class="nk-input-group">
        <label>Số điện thoại</label>
        <input type="tel" id="nk-phone" placeholder="Ví dụ: 0912345678">
      </div>
      <button id="nk-start-btn" onclick="nkStartChat()">Bắt đầu cuộc trò chuyện</button>
    </div>

    <div id="nk-chat-interface">
      <div id="nk-messages"></div>
      <div id="nk-seen-status"></div>
      <div id="nk-quick-replies"></div>
      <div id="nk-input-area">
        <textarea id="nk-input-msg" placeholder="Nhập tin nhắn..." rows="1"
          oninput="nkAutoResize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();nkSendMessage()}"></textarea>
        <button id="nk-send-msg-btn" onclick="nkSendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// =============================================
// ⚡ LADICHAT WIDGET — Async Firebase Loader
// Không dùng static <script src> để tránh block LadiPage
// =============================================
(function() {
  var NK = {
    fbConfig: {
      apiKey: "AIzaSyBixlTG4JuR3bx8OZ_27VRZ3YqDxVvSylM",
      authDomain: "gen-lang-client-0957346569.firebaseapp.com",
      databaseURL: "https://gen-lang-client-0957346569-default-rtdb.firebaseio.com",
      projectId: "gen-lang-client-0957346569",
      storageBucket: "gen-lang-client-0957346569.firebasestorage.app",
      messagingSenderId: "318435093664",
      appId: "1:318435093664:web:f8f3f68da5c4da352fadc5"
    },
    tgToken: '7890410484:AAHxMwViGPM-nmuG_U2sHjwF_7Ajs2VA0T0',
    tgChatId: '6843744862',
    db: null,
    sessionId: localStorage.getItem('nk_chat_session_id'),
    isOpen: false,
    unread: 0
  };

  // ---------- DYNAMIC SCRIPT LOADER ----------
  function loadScript(src, cb) {
    if (document.querySelector('script[src="' + src + '"]')) { cb(); return; }
    var s = document.createElement('script');
    s.src = src; s.async = true;
    s.onload = cb;
    s.onerror = function() { console.warn('[NikeChat] Script load failed:', src); };
    document.head.appendChild(s);
  }

  var FB = 'https://www.gstatic.com/firebasejs/10.12.0/';
  loadScript(FB + 'firebase-app-compat.js', function() {
    loadScript(FB + 'firebase-database-compat.js', function() {
      try {
        if (!firebase.apps.length) firebase.initializeApp(NK.fbConfig);
        NK.db = firebase.database();
        nkBoot(NK);
      } catch(e) { console.warn('[NikeChat] Init error:', e); }
    });
  });

  // ---------- BOOT (chạy sau khi Firebase sẵn sàng) ----------
  window.nkBoot = function(NK) {
    // Expose to global for inline handlers
    window._NK = NK;

    // Greeting tooltip
    var greeting = document.getElementById('nk-greeting');
    if (greeting && !sessionStorage.getItem('nk_greeting_shown')) {
      setTimeout(function() {
        greeting.classList.add('show');
        sessionStorage.setItem('nk_greeting_shown', '1');
        setTimeout(function() { greeting.classList.remove('show'); }, 5000);
      }, 1200);
    }

    // Nếu đã có session → vào thẳng chat
    if (NK.sessionId) {
      document.getElementById('nk-onboard').style.display = 'none';
      document.getElementById('nk-chat-interface').style.display = 'flex';
      listenForMessages();
      listenForSeenStatus();
      loadQuickReplies();
    }
  };
})();

// =============================================
// Tất cả function dưới đây dùng window._NK.db
// =============================================
function nkToggle() {
  var NK = window._NK; if (!NK) return;
  var box = document.getElementById('nk-chat-box');
  var btn = document.getElementById('nk-toggle-btn');
  var greeting = document.getElementById('nk-greeting');
  NK.isOpen = !NK.isOpen;
  greeting.classList.remove('show');

  if (NK.isOpen) {
    box.classList.add('open'); btn.classList.add('open');
    document.getElementById('nk-pulse').style.display = 'none';
    NK.unread = 0;
    document.getElementById('nk-unread-badge').style.display = 'none';
    if (NK.sessionId && NK.db) NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/unreadCustomer').set(false);
    var msgs = document.getElementById('nk-messages');
    msgs.scrollTop = msgs.scrollHeight;
  } else {
    box.classList.remove('open'); btn.classList.remove('open');
  }
}

function nkStartChat() {
  var NK = window._NK; if (!NK || !NK.db) return;
  var name = document.getElementById('nk-name').value.trim();
  var phone = document.getElementById('nk-phone').value.trim();
  if (!name || !phone) { alert('Vui lòng nhập đầy đủ Tên và Số điện thoại!'); return; }

  NK.sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
  localStorage.setItem('nk_chat_session_id', NK.sessionId);
  localStorage.setItem('nk_chat_name', name);

  NK.db.ref('nike-chat/conversations/' + NK.sessionId).set({
    customerName: name, customerPhone: phone,
    startedAt: Date.now(), lastMessageAt: Date.now(),
    lastMessage: 'Khách hàng bắt đầu hội thoại', unread: true
  });
  NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/messages').push({
    sender: 'admin',
    text: 'Chào ' + name + '! Cảm ơn bạn đã quan tâm đến Nike. Bạn cần tư vấn sản phẩm nào ạ?',
    timestamp: Date.now()
  });

  document.getElementById('nk-onboard').style.display = 'none';
  document.getElementById('nk-chat-interface').style.display = 'flex';
  listenForMessages(); listenForSeenStatus(); loadQuickReplies();
  sendTelegramNotif('👤 Khách mới: ' + name + ' (' + phone + ')\nĐã mở cửa sổ chat!');
}

function nkSendMessage() {
  var NK = window._NK; if (!NK || !NK.db || !NK.sessionId) return;
  var input = document.getElementById('nk-input-msg');
  var text = input.value.trim(); if (!text) return;
  input.value = ''; input.style.height = 'auto';

  NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/messages').push({ sender: 'customer', text: text, timestamp: Date.now() });
  NK.db.ref('nike-chat/conversations/' + NK.sessionId).update({ lastMessage: text, lastMessageAt: Date.now(), unread: true });
  var name = localStorage.getItem('nk_chat_name') || 'Khách';
  sendTelegramNotif('💬 ' + name + ': ' + text);
}

function nkSendQuickReply(question, answer) {
  var NK = window._NK; if (!NK || !NK.db || !NK.sessionId) return;

  NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/messages').push({ sender: 'customer', text: question, timestamp: Date.now() });
  NK.db.ref('nike-chat/conversations/' + NK.sessionId).update({ lastMessage: question, lastMessageAt: Date.now(), unread: true });
  var name = localStorage.getItem('nk_chat_name') || 'Khách';
  sendTelegramNotif('💬 ' + name + ': ' + question);

  if (answer) {
    setTimeout(function() {
      var NK = window._NK; if (!NK || !NK.db) return;
      NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/messages').push({ sender: 'admin', text: answer, timestamp: Date.now() });
      NK.db.ref('nike-chat/conversations/' + NK.sessionId).update({ lastMessage: '[Admin] ' + answer, lastMessageAt: Date.now(), unread: false, unreadCustomer: false });
    }, 700);
  }
}

function loadQuickReplies() {
  var NK = window._NK; if (!NK || !NK.db) return;
  NK.db.ref('nike-chat/quickReplies').on('value', function(snap) {
    var data = snap.val();
    var container = document.getElementById('nk-quick-replies');
    if (!data) { container.style.display = 'none'; return; }
    var items = Object.values(data).filter(function(v) { return v && (v.question || v.text); });
    if (!items.length) { container.style.display = 'none'; return; }
    container.style.display = 'flex';
    container.innerHTML = items.map(function(item) {
      var q = item.question || item.text;
      var a = item.answer || null;
      return '<button class="nk-qr-btn" onclick="nkSendQuickReply(' + JSON.stringify(q) + ',' + JSON.stringify(a) + ')">' + nkEsc(q) + '</button>';
    }).join('');
  });
}

function listenForMessages() {
  var NK = window._NK; if (!NK || !NK.db || !NK.sessionId) return;
  var msgsDiv = document.getElementById('nk-messages');
  var isFirstLoad = true;

  NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/messages').on('child_added', function(snap) {
    var msg = snap.val();
    var row = document.createElement('div');
    row.className = 'nk-msg-row ' + msg.sender;
    row.innerHTML = '<div><div class="nk-msg-bubble">' + nkEsc(msg.text) + '</div><div class="nk-msg-time">' + nkFormatTime(msg.timestamp) + '</div></div>';
    msgsDiv.appendChild(row);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;

    if (!isFirstLoad && msg.sender === 'admin') {
      if (!NK.isOpen) {
        NK.unread++;
        var badge = document.getElementById('nk-unread-badge');
        badge.textContent = NK.unread; badge.style.display = 'flex';
        try { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play(); } catch(e){}
      } else {
        if (NK.db) NK.db.ref('nike-chat/conversations/' + NK.sessionId + '/unreadCustomer').set(false);
      }
    }
  });
  setTimeout(function() { isFirstLoad = false; }, 1000);
}

function listenForSeenStatus() {
  var NK = window._NK; if (!NK || !NK.db || !NK.sessionId) return;
  NK.db.ref('nike-chat/conversations/' + NK.sessionId).on('value', function(snap) {
    var conv = snap.val(); if (!conv) return;
    var isAdminRead = conv.unread === false;
    var lastByCustomer = conv.lastMessage && !conv.lastMessage.startsWith('[Admin]') && conv.lastMessage !== 'Khách hàng bắt đầu hội thoại';
    var el = document.getElementById('nk-seen-status');
    if (el) {
      if (lastByCustomer) { el.style.display = 'block'; el.textContent = isAdminRead ? '✓ Đã xem' : '✓ Đã gửi'; }
      else { el.style.display = 'none'; }
    }
  });
}

function sendTelegramNotif(text) {
  var NK = window._NK;
  var token = NK ? NK.tgToken : ''; var chatId = NK ? NK.tgChatId : '';
  if (!token) return;
  fetch('https://api.telegram.org/bot' + token + '/sendMessage', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ chat_id: chatId, text: 'Nike Chat\n---\n' + text })
  }).catch(function(e){ console.log(e); });
}

function nkEsc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function nkFormatTime(ts) {
  var d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function nkAutoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
</script>
