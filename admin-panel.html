<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LadiChat — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--c-bg:#f5f5f5;--c-surface:#fff;--c-side:#fff;--c-side2:#f8f8f8;--c-border:#e8e8e8;--c-text:#111;--c-text2:#555;--c-text3:#999;--c-accent:#111;--c-accent2:#333;--c-green:#22c55e;--c-red:#fa5400;--c-red2:#fff5f0;--r:6px;--font:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
body{background:var(--c-bg);height:100vh;overflow:hidden;color:var(--c-text);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--font)}
input,textarea,select{font-family:var(--font)}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--c-bg);display:flex;align-items:center;justify-content:center;z-index:999}
#login-screen.hidden{display:none}
.login-box{background:#111;border:1px solid rgba(0,0,0,.1);border-radius:24px;padding:40px;width:360px;text-align:center;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 48px rgba(0,0,0,.15)}
.login-box img{width:52px;filter:invert(1);margin:0 auto}
.login-box h2{color:#fff;font-size:24px;font-weight:800;letter-spacing:-.5px;margin-top:4px}
.login-box p{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:8px}
.login-box input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;transition:.2s}
.login-box input:focus{border-color:#fff;background:rgba(255,255,255,.1)}
.login-box input::placeholder{color:rgba(255,255,255,.4)}
.login-box .btn-login{background:#fff;color:#111;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:.2s;width:100%}
.login-box .btn-login:hover{background:var(--c-red);color:#fff;transform:translateY(-1px)}
.login-error{color:#ff8a8a;font-size:12px;min-height:16px;font-weight:500}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:300px;min-width:300px;background:var(--c-side);border-right:1px solid var(--c-border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-header{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--c-border);flex-shrink:0;background:var(--c-text)}
#sidebar-header img{width:28px;filter:invert(1);flex-shrink:0}
#sidebar-header h1{color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;flex:1}
#sidebar-header span{color:rgba(255,255,255,.5);font-size:10px;display:block;margin-top:1px}
#online-dot{width:7px;height:7px;border-radius:50%;background:var(--c-green);box-shadow:0 0 0 2px rgba(34,197,94,.2);flex-shrink:0}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;padding:4px 6px;border-radius:4px;line-height:1;transition:.2s}
.sb-logout:hover{color:#fff;background:rgba(255,255,255,.1)}

/* GLOBAL AI BAR (dưới tabs) — ẨN (không dùng AI) */
#global-ai-bar{display:none!important}
#global-ai-bar:hover{opacity:.9}
.gai-left{display:flex;align-items:center;gap:10px;pointer-events:none;flex:1;min-width:0}
.gai-icon{font-size:18px;line-height:1;flex-shrink:0}
.gai-title{font-size:12px;font-weight:800;color:#fff;letter-spacing:.2px;line-height:1.2}
.gai-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;font-weight:500}
/* Switch toggle */
.gai-switch{display:flex;align-items:center;gap:8px;pointer-events:none;flex-shrink:0}
.gai-pill{position:relative;width:46px;height:24px;border-radius:99px;transition:background .3s,box-shadow .3s;flex-shrink:0}
.gai-pill.on{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.25)}
.gai-pill.off{background:#374151;box-shadow:none}
.gai-pill::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 4px rgba(0,0,0,.3)}
.gai-pill.on::after{transform:translateX(22px)}
.gai-badge{font-size:11px;font-weight:900;letter-spacing:.5px;min-width:26px;text-align:right}
.gai-badge.on{color:#4ade80}
.gai-badge.off{color:#6b7280}

/* TABS */
#sidebar-tabs{display:flex;border-bottom:1px solid var(--c-border);flex-shrink:0;background:var(--c-side)}
.stab{flex:1;padding:11px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--c-text3);border-bottom:2px solid transparent;transition:.2s;letter-spacing:.5px;text-transform:uppercase}
.stab:hover{color:var(--c-text)}
.stab.active{color:var(--c-text);border-bottom-color:var(--c-red)}

/* SEARCH */
#sidebar-search{padding:10px 12px;border-bottom:1px solid var(--c-border);flex-shrink:0;background:var(--c-side)}
#sidebar-search input{width:100%;background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--r);padding:8px 12px;color:var(--c-text);font-size:12px;outline:none;transition:.2s}
#sidebar-search input::placeholder{color:var(--c-text3)}
#sidebar-search input:focus{border-color:var(--c-text);background:var(--c-surface)}

/* CONV LIST */
#conv-list{flex:1;overflow-y:auto;background:var(--c-side)}
#conv-list::-webkit-scrollbar{width:3px}
#conv-list::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:4px}
.conv-item{padding:12px 14px;border-bottom:1px solid var(--c-border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s;position:relative}
.conv-item:hover{background:var(--c-bg)}
.conv-item.active{background:var(--c-bg);border-left:3px solid var(--c-red)}
.conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--c-text);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:13px;font-weight:700;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:11px;color:var(--c-text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.conv-time{font-size:10px;color:var(--c-text3)}
.conv-unread{width:7px;height:7px;border-radius:50%;background:var(--c-red)}
.conv-empty{padding:32px 16px;text-align:center;color:var(--c-text3);font-size:12px}

/* QR PANEL */
#qr-panel{flex:1;overflow-y:auto;padding:12px;display:none;flex-direction:column;gap:10px;background:var(--c-side)}
#qr-panel.active-tab{display:flex}
#qr-panel::-webkit-scrollbar{width:3px}
#qr-panel::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:4px}
#qr-form{background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
#qr-form label{font-size:10px;font-weight:700;color:var(--c-text3);text-transform:uppercase;letter-spacing:.8px}
#qr-form input,#qr-form textarea{width:100%;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:8px 11px;color:var(--c-text);font-size:13px;outline:none;resize:none;line-height:1.4;transition:.2s}
#qr-form input:focus,#qr-form textarea:focus{border-color:var(--c-text)}
#qr-form input::placeholder,#qr-form textarea::placeholder{color:var(--c-text3)}
#qr-add-btn{width:100%;padding:9px;background:var(--c-text);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;transition:.2s}
#qr-add-btn:hover{background:var(--c-red)}
#qr-list{display:flex;flex-direction:column;gap:8px}
.qr-item{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:12px}
.qr-item-q{font-size:13px;font-weight:700;color:var(--c-text);margin-bottom:4px}
.qr-item-a{font-size:12px;color:var(--c-text2);line-height:1.4;margin-bottom:10px}
.qr-item-actions{display:flex;gap:6px}
.qr-item-edit{flex:1;padding:5px;border:1px solid var(--c-border);border-radius:var(--r);background:var(--c-bg);color:var(--c-text2);font-size:11px;font-weight:700;letter-spacing:.3px;transition:.2s;text-transform:uppercase}
.qr-item-edit:hover{background:var(--c-text);color:#fff;border-color:var(--c-text)}
.qr-item-del{flex:1;padding:5px;border:1px solid #fcc;border-radius:var(--r);background:#fff5f5;color:#c00;font-size:11px;font-weight:700;letter-spacing:.3px;transition:.2s;text-transform:uppercase}
.qr-item-del:hover{background:#fee2e2}

/* SETTINGS PANEL */
#settings-panel{flex:1;overflow-y:auto;padding:12px;display:none;flex-direction:column;gap:12px;background:var(--c-side)}
#settings-panel.active-tab{display:flex}
#settings-panel::-webkit-scrollbar{width:3px}
#settings-panel::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:4px}
.sf-group{display:flex;flex-direction:column;gap:5px}
.sf-group label{font-size:10px;font-weight:700;color:var(--c-text3);text-transform:uppercase;letter-spacing:.8px}
.sf-group input,.sf-group select,.sf-group textarea{width:100%;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:8px 11px;color:var(--c-text);font-size:13px;outline:none;transition:.2s;resize:none}
.sf-group input:focus,.sf-group select:focus{border-color:var(--c-text)}
.sf-group select option{background:var(--c-surface);color:var(--c-text)}
.sf-color{display:flex;gap:8px;align-items:center}
.sf-color input[type=color]{width:38px;height:36px;padding:2px;border-radius:6px;cursor:pointer;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.sf-color input[type=text]{flex:1}
#settings-save{width:100%;padding:10px;background:var(--c-surface);color:var(--c-text);border:none;border-radius:8px;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;transition:.2s}
#settings-save:hover{background:var(--c-red);color:#fff}
#settings-save.saved{background:var(--c-green);color:#fff}

/* CHAT AREA */
#chat-area{flex:1;display:flex;flex-direction:column;background:var(--c-surface);overflow:hidden;min-width:0}
#chat-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--c-text3)}
#chat-placeholder img{width:56px;opacity:.15}
#chat-placeholder p{font-size:14px;font-weight:500}
#chat-placeholder small{font-size:12px;opacity:.7}
#chat-main{flex:1;display:none;flex-direction:column;background:#f8fafc;min-height:0}
#chat-header{padding:14px 20px;background:var(--c-surface);border-bottom:3px solid var(--c-text);display:flex;align-items:center;gap:12px;flex-shrink:0}
#chat-header-avatar{width:42px;height:42px;border-radius:50%;background:var(--c-text);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0;text-transform:uppercase}
.ch-info{flex:1;min-width:0}
#chat-header-name{font-size:15px;font-weight:900;color:var(--c-text);letter-spacing:-.3px}
#chat-header-sub{font-size:11px;color:var(--c-text2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ch-tag{background:var(--c-bg);color:var(--c-text2);font-size:10px;font-weight:700;padding:2px 7px;letter-spacing:.5px}
.ch-ip{font-size:10px;color:var(--c-text3);font-family:monospace;background:#f0f0f0;padding:1px 6px}
#chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:0}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:4px}
.msg-row{display:flex;width:100%}
.msg-row.customer{justify-content:flex-start}
.msg-row.admin{justify-content:flex-end}
.msg-row>div{max-width:68%;display:flex;flex-direction:column}
.msg-row.customer>div{align-items:flex-start}
.msg-row.admin>div{align-items:flex-end}
.msg-bubble{padding:10px 16px;border-radius:4px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-row.customer .msg-bubble{background:var(--c-surface);color:var(--c-text);border-bottom-left-radius:0;border:1px solid var(--c-border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg-row.admin .msg-bubble{background:var(--c-text);color:#fff;border-bottom-right-radius:0}
.msg-time{font-size:10px;color:var(--c-text3);margin-top:4px}
#chat-seen-status{text-align:right;font-size:11px;color:var(--c-text3);padding:0 20px 8px;display:none;flex-shrink:0}
#chat-input-area{padding:14px 16px;background:var(--c-surface);border-top:1px solid var(--c-border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
#admin-reply{flex:1;border:1.5px solid var(--c-border);border-radius:14px;padding:10px 15px;font-size:14px;resize:none;outline:none;max-height:120px;min-height:44px;line-height:1.5;transition:.2s;background:var(--c-bg)}
#admin-reply:focus{border-color:var(--c-text);background:#fff}
#send-reply-btn{width:42px;height:42px;background:var(--c-text);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-size:16px}
#send-reply-btn:hover{background:var(--c-red)}

/* CONV COUNT BADGE */
#conv-count{background:rgba(99,102,241,.2);color:var(--c-accent);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.3px}

/* PER-SESSION AI TOGGLE (in chat header) — ẨN (không dùng AI) */
.ai-toggle-wrap{display:none!important}
.ai-toggle-label{font-size:11px;font-weight:700;letter-spacing:.2px;color:#374151}
.ai-toggle-btn{position:relative;width:40px;height:22px;border-radius:99px;border:none;cursor:pointer;transition:background .25s,box-shadow .2s;flex-shrink:0;padding:0;outline:none}
.ai-toggle-btn.on{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.ai-toggle-btn.off{background:#d1d5db;box-shadow:none}
.ai-toggle-btn::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ai-toggle-btn.on::after{transform:translateX(18px)}
.ai-status-txt{font-size:10px;font-weight:800;letter-spacing:.5px;min-width:24px}
.ai-status-txt.on{color:#16a34a}
.ai-status-txt.off{color:#9ca3af}
.msg-ai-badge{font-size:9px;color:#10b981;font-weight:700;display:flex;align-items:center;gap:3px;margin-bottom:3px;letter-spacing:.3px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:4px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike">
    <h2>LadiChat Admin</h2>
    <p>Đăng nhập để quản lý hội thoại</p>
    <input type="email" id="email-input" placeholder="Email (vd: admin@nike-mind.online)" value="admin@nike-mind.online">
    <input type="password" id="pwd-input" placeholder="Mật khẩu" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" id="btn-login" onclick="doLogin()">Đăng nhập →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike">
      <div style="flex:1;min-width:0">
        <h1>Support Nike</h1>
        <span id="conv-count">0 hội thoại</span>
      </div>
      <div id="online-dot"></div>
      <button class="sb-logout" onclick="doLogout()" title="Đăng xuất">⏻</button>
    </div>

    <!-- TABS -->
    <div id="sidebar-tabs">
      <div class="stab active" onclick="switchTab('convs')" id="tab-convs">💬 Hội thoại</div>
      <div class="stab" onclick="switchTab('qr')" id="tab-qr">⚡ Quick Replies</div>
      <div class="stab" onclick="switchTab('settings')" id="tab-settings">⚙️ Cài đặt</div>
    </div>

    <!-- GLOBAL AI BAR — click handler registered via addEventListener in JS -->
    <div id="global-ai-bar" role="button" tabindex="0">
      <div class="gai-left">
        <span class="gai-icon">🤖</span>
        <div>
          <div class="gai-title">AI Auto-Reply</div>
          <div class="gai-sub">Áp dụng cho tất cả khách hàng</div>
        </div>
      </div>
      <div class="gai-switch">
        <div class="gai-pill off" id="global-ai-btn"></div>
        <span class="gai-badge off" id="global-ai-status">OFF</span>
      </div>
    </div>

    <!-- CONVERSATIONS TAB -->
    <div id="sidebar-search"><input type="text" id="search-input" placeholder="🔍 Tìm kiếm hội thoại..." oninput="filterConvs(this.value)"></div>
    <div id="conv-list"></div>

    <!-- QUICK REPLIES PANEL -->
    <div id="qr-panel">
      <div id="qr-form">
        <label>Câu hỏi hiển thị cho khách</label>
        <input type="text" id="qr-new-q" placeholder="Giao hàng trong bao lâu?">
        <label>Câu trả lời tự động</label>
        <textarea id="qr-new-a" placeholder="Dạ trong vòng 3-5 ngày ạ..." rows="3"></textarea>
        <button id="qr-add-btn" onclick="addQuickReply()">+ Thêm câu hỏi</button>
        <button id="qr-cancel-btn" onclick="cancelEditQr()" style="display:none;width:100%;padding:8px;background:transparent;border:1px solid var(--c-border);border-radius:var(--r);font-size:12px;color:var(--c-text2);cursor:pointer;transition:.2s;">✕ Hủy sửa</button>
      </div>
      <div id="qr-list"></div>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel">
      <div class="sf-group">
        <label>Tên thương hiệu</label>
        <input type="text" id="sf-brand-name" placeholder="Support Nike">
      </div>
      <div class="sf-group">
        <label>Dòng phụ dưới tên (“Thường trả lời trong vài phút”)</label>
        <input type="text" id="sf-brand-sub" placeholder="Thường trả lời trong vài phút">
      </div>
      <div class="sf-group">
        <label>Tin nhắn bong bóng chà (“Trò chuyện cùng Support Nike 👋”)</label>
        <input type="text" id="sf-greeting" placeholder="Trò chuyện cùng Support Nike 👋">
      </div>
      <div class="sf-group">
        <label>Màu chủ đạo</label>
        <div class="sf-color">
          <input type="color" id="sf-color-picker" value="#111111" oninput="document.getElementById('sf-color-hex').value=this.value">
          <input type="text" id="sf-color-hex" placeholder="#111111" oninput="document.getElementById('sf-color-picker').value=this.value">
        </div>
      </div>
      <div class="sf-group">
        <label>Ngôn ngữ hiển thị</label>
        <select id="sf-lang">
          <option value="vi">🇻🇳 Tiếng Việt</option>
          <option value="en">🇬🇧 English</option>
          <option value="th">🇹🇭 ภาษาไทย</option>
        </select>
      </div>
      <button id="settings-save" onclick="saveSettings()">💾 Lưu cài đặt</button>
    </div>
  </div>

  <div id="chat-area">
    <div id="chat-placeholder">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike">
      <p>Chọn một hội thoại để bắt đầu</p>
    </div>
    <div id="chat-main">
      <div id="chat-header">
        <div id="chat-header-avatar"></div>
        <div class="ch-info">
          <div id="chat-header-name"></div>
          <div id="chat-header-sub"></div>
        </div>
        <!-- PER-SESSION AI TOGGLE -->
        <div class="ai-toggle-wrap" id="ai-toggle-wrap" style="display:none" title="Bật/Tắt AI cho hội thoại này">
          <span class="ai-toggle-label">🤖 AI</span>
          <button class="ai-toggle-btn off" id="ai-toggle-btn" onclick="toggleAIMode()"></button>
          <span class="ai-status-txt off" id="ai-status-txt">TẮT</span>
        </div>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-seen-status"></div>
      <div id="chat-input-area">
        <textarea id="admin-reply" placeholder="Nhập tin nhắn reply..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"
          oninput="autoResize(this)"></textarea>
        <button id="send-reply-btn" onclick="sendReply()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// =============================================
// ⚙️ CẤU HÌNH
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBixlTG4JuR3bx8OZ_27VRZ3YqDxVvSylM",
  authDomain: "gen-lang-client-0957346569.firebaseapp.com",
  databaseURL: "https://gen-lang-client-0957346569-default-rtdb.firebaseio.com",
  projectId: "gen-lang-client-0957346569",
  storageBucket: "gen-lang-client-0957346569.firebasestorage.app",
  messagingSenderId: "318435093664",
  appId: "1:318435093664:web:f8f3f68da5c4da352fadc5"
};
const DB_PATH = 'nike-chat/conversations';
// =============================================

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const auth = firebase.auth();

let allConvs = {};
let activeSessionId = null;

// Âm thanh thông báo cho Admin (dùng AudioContext để không bị trình duyệt chặn)
let adminAudioCtx = null;
function playAdminSound() {
  try {
    if (!adminAudioCtx) adminAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = adminAudioCtx.createOscillator();
    const g = adminAudioCtx.createGain();
    o.connect(g); g.connect(adminAudioCtx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(880, adminAudioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, adminAudioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.07, adminAudioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, adminAudioCtx.currentTime + 0.4);
    o.start(); o.stop(adminAudioCtx.currentTime + 0.4);
  } catch(e) {}
}

// --- LOGIN ---
function doLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pwd = document.getElementById('pwd-input').value;
  const errDiv = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!email || !pwd) {
    errDiv.textContent = 'Vui lòng nhập Email và Mật khẩu!';
    return;
  }

  btn.textContent = 'ĐANG ĐĂNG NHẬP...';
  errDiv.textContent = '';

  auth.signInWithEmailAndPassword(email, pwd)
    .catch((error) => {
      btn.textContent = 'Đăng nhập →';
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
        errDiv.textContent = 'Sai tài khoản hoặc mật khẩu!';
      } else {
        errDiv.textContent = 'Lỗi: ' + error.message;
      }
    });
}

function doLogout() {
  auth.signOut().then(() => {
    location.reload();
  });
}

// Tự động login nếu đã xác thực trước
let isAdminInit = false;
auth.onAuthStateChanged((user) => {
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    if (!isAdminInit) {
      isAdminInit = true;
      initAdmin();
    }
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

// --- INIT ---
function initAdmin() {
  db.ref(DB_PATH).on('value', (snapshot) => {
    const newConvs = snapshot.val() || {};

    // Phát âm thanh khi có tin nhắn mới từ khách (unread = true)
    Object.entries(newConvs).forEach(([sid, conv]) => {
      const old = allConvs[sid];
      if (conv.unread && (!old || !old.unread || conv.lastMessageAt !== old.lastMessageAt)) {
        playAdminSound();
      }
    });

    allConvs = newConvs;
    renderConvList(allConvs);
  });

  loadQrList();
  loadSettings();
  listenGlobalAIMode();

  // Attach click handler after Firebase is ready
  const aiBar = document.getElementById('global-ai-bar');
  if (aiBar) {
    aiBar.addEventListener('click', toggleGlobalAI);
    aiBar.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') toggleGlobalAI(); });
  }
}

// --- GLOBAL AI MODE ---
function listenGlobalAIMode() {
  db.ref('nike-chat/globalAIMode').on('value', (snap) => {
    const isOn = snap.val() !== false;
    const btn = document.getElementById('global-ai-btn');
    const txt = document.getElementById('global-ai-status');
    if (!btn) return;
    btn.className = 'gai-pill ' + (isOn ? 'on' : 'off');
    txt.className  = 'gai-badge ' + (isOn ? 'on' : 'off');
    txt.textContent = isOn ? 'ON' : 'OFF';
  });
}

function toggleGlobalAI() {
  console.log('[LadiChat] toggleGlobalAI called');
  const aiBar = document.getElementById('global-ai-bar');
  if (aiBar) aiBar.style.opacity = '0.6';
  db.ref('nike-chat/globalAIMode').once('value', (snap) => {
    const current = snap.val() !== false;
    const next = !current;
    db.ref('nike-chat/globalAIMode').set(next).then(() => {
      if (aiBar) aiBar.style.opacity = '1';
      console.log('[LadiChat] globalAIMode set to', next);
    });
    if (!next) {
      // Broadcast system message to all active conversations
      db.ref('nike-chat/conversations').once('value', (cSnap) => {
        const convs = cSnap.val() || {};
        Object.keys(convs).forEach(sid => {
          if (convs[sid].aiMode) {
            db.ref(`nike-chat/conversations/${sid}/messages`).push({
              sender: 'system',
              text: '— Admin đã tắt AI Bot toàn hệ thống. Nhân viên sẽ hỗ trợ bạn —',
              timestamp: Date.now()
            });
          }
        });
      });
    }
  });
}

// --- TAB SWITCH ---
function switchTab(tab) {
  ['convs','qr','settings'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', tab === id);
  });
  document.getElementById('sidebar-search').style.display = tab === 'convs' ? 'block' : 'none';
  document.getElementById('conv-list').style.display    = tab === 'convs' ? 'block' : 'none';
  document.getElementById('qr-panel').classList.toggle('active-tab',       tab === 'qr');
  document.getElementById('settings-panel').classList.toggle('active-tab', tab === 'settings');
}

// --- SETTINGS ---
function loadSettings() {
  db.ref('nike-chat/settings').once('value', snap => {
    const s = snap.val() || {};
    document.getElementById('sf-brand-name').value = s.brandName  || '';
    document.getElementById('sf-brand-sub').value  = s.brandSub   || '';
    document.getElementById('sf-greeting').value   = s.greetingText || '';
    const color = s.primaryColor || '#111111';
    document.getElementById('sf-color-picker').value = color;
    document.getElementById('sf-color-hex').value    = color;
    document.getElementById('sf-lang').value = s.lang || 'vi';
  });
}

function saveSettings() {
  const btn = document.getElementById('settings-save');
  const data = {
    brandName:    document.getElementById('sf-brand-name').value.trim() || 'Support Nike',
    brandSub:     document.getElementById('sf-brand-sub').value.trim()  || 'Thường trả lời trong vài phút',
    greetingText: document.getElementById('sf-greeting').value.trim()   || 'Trò chuyện cùng Support Nike 👋',
    primaryColor: document.getElementById('sf-color-hex').value.trim()  || '#111111',
    lang:         document.getElementById('sf-lang').value,
    updatedAt:    Date.now()
  };
  db.ref('nike-chat/settings').set(data).then(() => {
    btn.textContent = '✅ Đã lưu!';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = '💾 Lưu cài đặt'; btn.classList.remove('saved'); }, 2500);
  });
}

// --- RENDER CONV LIST ---
function renderConvList(convs) {
  const list = document.getElementById('conv-list');
  const entries = Object.entries(convs).sort((a, b) => (b[1].lastMessageAt || 0) - (a[1].lastMessageAt || 0));

  document.getElementById('conv-count').textContent = entries.length + ' hội thoại';

  if (entries.length === 0) {
    list.innerHTML = '<div id="no-convs" style="padding:24px;text-align:center;color:#bbb;font-size:13px;">Chưa có hội thoại nào</div>';
    return;
  }

  list.innerHTML = entries.map(([sid, conv]) => {
    const initial = (conv.customerName || '?')[0].toUpperCase();
    const time = conv.lastMessageAt ? formatTime(conv.lastMessageAt) : '';
    const preview = conv.lastMessage || 'Bắt đầu hội thoại...';
    const unread = conv.unread ? '<div class="conv-unread"></div>' : '';
    return `
      <div class="conv-item ${sid === activeSessionId ? 'active' : ''}" onclick="openConv('${sid}')">
        <div class="conv-avatar">${initial}</div>
        <div class="conv-info">
          <div class="conv-name">${escHtml(conv.customerName || 'Khách')}</div>
          <div class="conv-preview">${escHtml(preview)}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${time}</div>
          ${unread}
        </div>
      </div>`;
  }).join('');

  // Update seen status for active session
  if (activeSessionId && allConvs[activeSessionId]) {
    const activeConv = allConvs[activeSessionId];
    const isCustomerRead = activeConv.unreadCustomer === false;
    const lastMsgByAdmin = activeConv.lastMessage && activeConv.lastMessage.startsWith('[Admin]');
    const seenStatus = document.getElementById('chat-seen-status');
    if (seenStatus) {
      if (lastMsgByAdmin) {
        seenStatus.style.display = 'block';
        seenStatus.textContent = isCustomerRead ? '✓ Đã xem' : '✓ Đã gửi';
      } else {
        seenStatus.style.display = 'none';
      }
    }
  }
}

// AI MODE TOGGLE
let aiModeListener = null;

function listenAIMode(sessionId) {
  // Hủy listener cũ
  if (aiModeListener) {
    db.ref(aiModeListener).off();
    aiModeListener = null;
  }
  const path = `${DB_PATH}/${sessionId}/aiMode`;
  aiModeListener = path;
  db.ref(path).on('value', (snap) => {
    const isOn = !!snap.val();
    const btn = document.getElementById('ai-toggle-btn');
    const txt = document.getElementById('ai-status-txt');
    const wrap = document.getElementById('ai-toggle-wrap');
    if (!btn) return;
    wrap.style.display = 'flex';
    btn.className = 'ai-toggle-btn ' + (isOn ? 'on' : 'off');
    txt.className  = 'ai-status-txt ' + (isOn ? 'on' : 'off');
    txt.textContent = isOn ? 'BẬT' : 'TẮT';
  });
}

function toggleAIMode() {
  if (!activeSessionId) return;
  const path = `${DB_PATH}/${activeSessionId}/aiMode`;
  db.ref(path).once('value', (snap) => {
    const current = !!snap.val();
    db.ref(path).set(!current).then(() => {
      // Nếu tắt AI → thêm message hệ thống vào chat
      if (current) {
        db.ref(`${DB_PATH}/${activeSessionId}/messages`).push({
          sender: 'system',
          text: '— Admin đã tắt AI Bot. Chế độ chat 1-1 đang hoạt động —',
          timestamp: Date.now()
        });
      } else {
        db.ref(`${DB_PATH}/${activeSessionId}/messages`).push({
          sender: 'system',
          text: '— AI Bot đã được bật. Bot sẽ tự động phản hồi —',
          timestamp: Date.now()
        });
      }
    });
  });
}

// --- OPEN CONVERSATION ---
function openConv(sessionId) {
  const conv = allConvs[sessionId];
  if (!conv) return;

  if (activeSessionId) {
    db.ref(`${DB_PATH}/${activeSessionId}/messages`).off();
  }

  activeSessionId = sessionId;
  db.ref(`${DB_PATH}/${sessionId}/unread`).set(false);

  const initial = (conv.customerName || '?')[0].toUpperCase();
  document.getElementById('chat-header-avatar').textContent = initial;
  document.getElementById('chat-header-name').textContent = conv.customerName || 'Khách';
  const sub = document.getElementById('chat-header-sub');
  const phoneTag = conv.customerPhone ? `<span class="ch-tag">📞 ${escHtml(conv.customerPhone)}</span>` : '';
  const timeTag = conv.startedAt ? `<span class="ch-tag">⏰ Bắt đầu: ${formatFull(conv.startedAt)}</span>` : '';
  const ipTag = conv.userIP ? `<span class="ch-ip">IP: ${escHtml(conv.userIP)}</span>` : '';
  sub.innerHTML = phoneTag + timeTag + ipTag;

  document.getElementById('chat-placeholder').style.display = 'none';
  document.getElementById('chat-main').style.display = 'flex';
  document.getElementById('chat-main').style.flexDirection = 'column';
  document.getElementById('chat-messages').innerHTML = '';

  // Start listening AI mode for this session
  listenAIMode(sessionId);

  db.ref(`${DB_PATH}/${sessionId}/messages`).on('child_added', (snap) => {
    const msg = snap.val();
    appendMsg(msg);
    if (msg.sender === 'customer') {
      db.ref(`${DB_PATH}/${sessionId}/unread`).set(false);
    }
  });

  renderConvList(allConvs);
}

// --- APPEND MESSAGE ---
function appendMsg(msg) {
  const div = document.createElement('div');
  // System message (AI divider)
  if (msg.sender === 'system') {
    div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0;margin:4px 0';
    div.innerHTML = `<div style="flex:1;height:1px;background:#e0e0e0"></div><div style="font-size:10px;color:#aaa;white-space:nowrap;font-style:italic">${escHtml(msg.text)}</div><div style="flex:1;height:1px;background:#e0e0e0"></div>`;
    document.getElementById('chat-messages').appendChild(div);
    document.getElementById('chat-messages').scrollTop = 99999;
    return;
  }
  div.className = 'msg-row ' + (msg.sender === 'admin' ? 'admin' : 'customer');
  const aiBadge = (msg.isAI && msg.sender === 'admin') ? '<div class="msg-ai-badge">🤖 Nike Bot</div>' : '';
  div.innerHTML = `
    <div>
      ${aiBadge}
      <div class="msg-bubble">${escHtml(msg.text)}</div>
      <div class="msg-time">${formatFull(msg.timestamp)}</div>
    </div>`;
  document.getElementById('chat-messages').appendChild(div);
  document.getElementById('chat-messages').scrollTop = 99999;
}

// --- SEND REPLY ---
function sendReply() {
  if (!activeSessionId) return;
  const text = document.getElementById('admin-reply').value.trim();
  if (!text) return;

  db.ref(`${DB_PATH}/${activeSessionId}/messages`).push({
    text: text,
    sender: 'admin',
    timestamp: Date.now()
  });

  db.ref(`${DB_PATH}/${activeSessionId}`).update({
    lastMessage: '[Admin] ' + text,
    lastMessageAt: Date.now(),
    unread: false,
    unreadCustomer: true
  });

  document.getElementById('admin-reply').value = '';
  document.getElementById('admin-reply').style.height = 'auto';
}

// =============================================
// ⚡ QUICK REPLIES MANAGEMENT
// =============================================
var _qrEntries = []; // lưu để edit theo index

function loadQrList() {
  db.ref('nike-chat/quickReplies').on('value', (snap) => {
    const data = snap.val() || {};
    const container = document.getElementById('qr-list');
    _qrEntries = Object.entries(data).filter(([k,v]) => v && v.question);

    if (!_qrEntries.length) {
      container.innerHTML = '<div style="font-size:13px;color:#bbb;text-align:center;padding:12px 0;">Chưa có câu hỏi nào. Thêm bên trên nhé!</div>';
      return;
    }

    container.innerHTML = _qrEntries.map(([key, item], idx) => `
      <div class="qr-item">
        <div class="qr-item-q">❓ ${escHtml(item.question)}</div>
        <div class="qr-item-a">💬 ${escHtml(item.answer || '(chưa có câu trả lời)')}</div>
        <div class="qr-item-actions">
          <button class="qr-item-edit" onclick="editQuickReply(${idx})">✏️ Sửa</button>
          <button class="qr-item-del" onclick="deleteQuickReply('${key}')">🗑 Xóa</button>
        </div>
      </div>`).join('');
  });
}

function addQuickReply() {
  const qInput = document.getElementById('qr-new-q');
  const aInput = document.getElementById('qr-new-a');
  const question = qInput.value.trim();
  const answer = aInput.value.trim();
  if (!question || !answer) { alert('Vui lòng nhập cả Câu hỏi và Câu trả lời!'); return; }
  if (editingQrKey) {
    db.ref('nike-chat/quickReplies/' + editingQrKey).update({ question, answer });
    cancelEditQr();
  } else {
    db.ref('nike-chat/quickReplies').push({ question, answer });
    qInput.value = ''; aInput.value = '';
  }
}

var editingQrKey = null;

function editQuickReply(idx) {
  var entry = _qrEntries[idx];
  if (!entry) return;
  editingQrKey = entry[0];
  document.getElementById('qr-new-q').value = entry[1].question;
  document.getElementById('qr-new-a').value = entry[1].answer || '';
  document.getElementById('qr-add-btn').textContent = '✓ Cập nhật';
  document.getElementById('qr-cancel-btn').style.display = 'block';
  document.getElementById('qr-new-q').focus();
}

function cancelEditQr() {
  editingQrKey = null;
  document.getElementById('qr-new-q').value = '';
  document.getElementById('qr-new-a').value = '';
  document.getElementById('qr-add-btn').textContent = '+ Thêm câu hỏi';
  document.getElementById('qr-cancel-btn').style.display = 'none';
}

function deleteQuickReply(key) {
  if (confirm('Xóa câu hỏi này?')) db.ref('nike-chat/quickReplies/' + key).remove();
}

// --- FILTER ---
function filterConvs() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = {};
  Object.entries(allConvs).forEach(([sid, conv]) => {
    if ((conv.customerName || '').toLowerCase().includes(q)) {
      filtered[sid] = conv;
    }
  });
  renderConvList(filtered);
}

// --- UTILS ---
function formatFull(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const date = d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const time = d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  return date + ' · ' + time;
}
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
