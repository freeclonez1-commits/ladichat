<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nike Mind – Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #fff; color: #111; }

    /* NAVBAR */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid #e5e5e5; position: sticky; top: 0; background: #fff; z-index: 100;
    }
    .nav-logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; text-decoration: none; color: #111; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { text-decoration: none; color: #111; font-size: 14px; font-weight: 500; }
    .nav-links a:hover { text-decoration: underline; }
    .nav-cart-btn {
      background: none; border: none; cursor: pointer; position: relative; padding: 8px;
    }
    .nav-cart-btn svg { width: 24px; height: 24px; }
    .cart-badge {
      display: none; position: absolute; top: 0; right: 0;
      background: #111; color: #fff; border-radius: 50%;
      width: 18px; height: 18px; font-size: 11px; font-weight: 700;
      align-items: center; justify-content: center;
    }
    .cart-badge.active { display: flex; }

    /* HERO */
    .hero {
      background: #111; color: #fff; min-height: 70vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
      padding: 40px 20px;
    }
    .hero h1 { font-size: 56px; font-weight: 900; letter-spacing: -2px; margin-bottom: 16px; }
    .hero p { font-size: 18px; color: #aaa; margin-bottom: 40px; }

    /* PRODUCT CARD */
    .product-section { max-width: 960px; margin: 60px auto; padding: 0 20px; }
    .product-section h2 { font-size: 24px; font-weight: 500; margin-bottom: 32px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .product-card { border: 1px solid #e5e5e5; padding: 24px; cursor: pointer; transition: box-shadow 0.2s; }
    .product-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .product-card .img-placeholder {
      width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #f0f0f0, #d8d8d8);
      margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px;
    }
    .product-card h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .product-card .subtitle { font-size: 14px; color: #757575; margin-bottom: 12px; }
    .product-card .price { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
    .btn-add {
      width: 100%; padding: 14px; background: #111; color: #fff; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer; letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #444; }

    /* CART SIDEBAR */
    .cart-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
    }
    .cart-overlay.active { display: block; }
    .cart-sidebar {
      position: fixed; top: 0; right: -420px; width: 420px; max-width: 95vw; height: 100%;
      background: #fff; z-index: 201; display: flex; flex-direction: column;
      transition: right 0.3s ease; padding: 24px;
    }
    .cart-sidebar.active { right: 0; }
    .cart-sidebar-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
    }
    .cart-sidebar-header h2 { font-size: 20px; font-weight: 500; }
    .btn-close-cart { background: none; border: none; cursor: pointer; font-size: 24px; line-height: 1; }
    .cart-items { flex: 1; overflow-y: auto; }
    .cart-empty { text-align: center; color: #757575; padding: 60px 0; font-size: 15px; }
    .cart-item {
      display: flex; align-items: center; gap: 16px; padding: 16px 0;
      border-bottom: 1px solid #e5e5e5;
    }
    .cart-item-img {
      width: 72px; height: 72px; background: #f5f5f5;
      display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-info h4 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .cart-item-info p { font-size: 13px; color: #757575; }
    .cart-item-qty { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .btn-qty { background: none; border: 1px solid #e5e5e5; width: 28px; height: 28px; cursor: pointer; font-size: 16px; }
    .cart-item-price { font-size: 14px; font-weight: 500; flex-shrink: 0; }
    .btn-remove { background: none; border: none; cursor: pointer; font-size: 18px; color: #757575; }
    .cart-footer { margin-top: 24px; }
    .cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 500; margin-bottom: 16px; }
    .btn-checkout {
      width: 100%; padding: 16px; background: #111; color: #fff; border: none;
      font-size: 15px; font-weight: 500; cursor: pointer; letter-spacing: 0.5px;
    }
    .btn-checkout:hover { background: #444; }

    /* NOTIFICATION TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #111; color: #fff; padding: 14px 24px; font-size: 14px;
      border-radius: 4px; z-index: 300; transition: transform 0.3s ease; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .hero h1 { font-size: 36px; }
      .nav { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <a href="#" class="nav-logo">NIKE</a>
  <div class="nav-links">
    <a href="#products">Sản phẩm</a>
    <a href="nike-about-page.html">About</a>
    <a href="nike-shipping-delivery.html">Shipping</a>
  </div>
  <button class="nav-cart-btn" onclick="toggleCart()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Just Do It.</h1>
  <p>สินค้าใหม่ สไตล์ล้ำ พร้อมส่งถึงมือคุณ</p>
</section>

<!-- PRODUCTS -->
<section class="product-section" id="products">
  <h2>สินค้าแนะนำ</h2>
  <div class="product-grid" id="productGrid"></div>
</section>

<!-- CART OVERLAY + SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-sidebar-header">
    <h2>ตะกร้าสินค้า</h2>
    <button class="btn-close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total">
      <span>รวมทั้งหมด</span>
      <span id="cartTotal">฿0</span>
    </div>
    <button class="btn-checkout">สั่งซื้อเลย</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── PRODUCTS DATA ──────────────────────────────────────────────
  const products = [
    { id: 1, emoji: '👟', name: 'Nike Air Max 100', variant: 'White/Black', price: 3900 },
    { id: 2, emoji: '🏃', name: 'Nike React Phantom', variant: 'Blue/White', price: 4500 },
    { id: 3, emoji: '⚽', name: 'Nike Mercurial Pro', variant: 'Red/Black', price: 5200 },
    { id: 4, emoji: '🧢', name: 'Nike Dri-FIT Cap', variant: 'Black', price: 890 },
  ];

  // ── CART STATE (LocalStorage ── works across pages!) ───────────
  var cart = JSON.parse(localStorage.getItem('nike_cart_v2') || '[]');

  function saveCart() {
    localStorage.setItem('nike_cart_v2', JSON.stringify(cart));
  }

  function addToCart(productId) {
    var product = products.find(function(p){ return p.id === productId; });
    var existing = cart.find(function(i){ return i.id === productId; });
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ id: product.id, emoji: product.emoji, name: product.name, variant: product.variant, price: product.price, qty: 1 });
    }
    saveCart();
    renderCart();
    showToast('เพิ่ม ' + product.name + ' ลงตะกร้าแล้ว ✓');
  }

  function removeFromCart(productId) {
    cart = cart.filter(function(i){ return i.id !== productId; });
    saveCart();
    renderCart();
  }

  function changeQty(productId, delta) {
    var item = cart.find(function(i){ return i.id === productId; });
    if (!item) return;
    item.qty = Math.max(1, item.qty + delta);
    saveCart();
    renderCart();
  }

  // ── RENDER ──────────────────────────────────────────────────────
  function renderProducts() {
    var grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(function(p) {
      return '<div class="product-card">' +
        '<div class="img-placeholder">' + p.emoji + '</div>' +
        '<h3>' + p.name + '</h3>' +
        '<p class="subtitle">' + p.variant + '</p>' +
        '<p class="price">฿' + p.price.toLocaleString() + '</p>' +
        '<button class="btn-add" onclick="addToCart(' + p.id + ')">เพิ่มลงตะกร้า</button>' +
      '</div>';
    }).join('');
  }

  function renderCart() {
    var itemsEl = document.getElementById('cartItems');
    var footerEl = document.getElementById('cartFooter');
    var badgeEl = document.getElementById('cartBadge');
    var totalEl = document.getElementById('cartTotal');

    var totalCount = cart.reduce(function(s,i){ return s + i.qty; }, 0);
    var totalPrice = cart.reduce(function(s,i){ return s + i.price * i.qty; }, 0);

    // Badge
    badgeEl.textContent = totalCount;
    badgeEl.className = 'cart-badge' + (totalCount > 0 ? ' active' : '');

    // Footer
    footerEl.style.display = cart.length > 0 ? 'block' : 'none';
    totalEl.textContent = '฿' + totalPrice.toLocaleString();

    // Items
    if (cart.length === 0) {
      itemsEl.innerHTML = '<div class="cart-empty">ตะกร้าของคุณยังว่างอยู่</div>';
      return;
    }

    itemsEl.innerHTML = cart.map(function(item) {
      return '<div class="cart-item">' +
        '<div class="cart-item-img">' + item.emoji + '</div>' +
        '<div class="cart-item-info">' +
          '<h4>' + item.name + '</h4>' +
          '<p>' + item.variant + '</p>' +
          '<div class="cart-item-qty">' +
            '<button class="btn-qty" onclick="changeQty(' + item.id + ', -1)">−</button>' +
            '<span>' + item.qty + '</span>' +
            '<button class="btn-qty" onclick="changeQty(' + item.id + ', 1)">+</button>' +
          '</div>' +
        '</div>' +
        '<div>' +
          '<div class="cart-item-price">฿' + (item.price * item.qty).toLocaleString() + '</div>' +
          '<button class="btn-remove" onclick="removeFromCart(' + item.id + ')">✕</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── TOGGLE CART ─────────────────────────────────────────────────
  function toggleCart() {
    var sidebar = document.getElementById('cartSidebar');
    var overlay = document.getElementById('cartOverlay');
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
  }

  // ── TOAST ───────────────────────────────────────────────────────
  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2500);
  }

  // ── INIT ─────────────────────────────────────────────────────────
  renderProducts();
  renderCart();
</script>
</body>
</html>
